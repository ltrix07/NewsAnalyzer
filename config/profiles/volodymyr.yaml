profile:
  name: volodymyr
  location: "PL (Warsaw)"
  citizenship: UA
  languages: [ru, uk, pl, en]
  output_language: ru

  interests:
    - "Karta pobytu and residence/work permits for Ukrainians in Poland — RULE CHANGES only, not statistics or commentary"
    - "Temporary protection for Ukrainians in EU — extensions, modifications, expiration timelines"
    - "Polish tax/labor law changes affecting foreign workers specifically (not general Polish workforce)"
    - "Ukrainian mobilization rules affecting citizens abroad: status, return obligations, draft notices"

    - "NBP interest rate decisions and their immediate effect on PLN, mortgages, deposits"
    - "PLN-UAH exchange rate movements affecting remittances and savings"
    - "Polish inflation prints that change cost of living for residents"

    - "KNF, ESMA, MiFID regulatory changes affecting retail algorithmic trading rules, leverage, instruments"
    - "Specific broker policy changes or instrument restrictions in EU jurisdictions"

    - "Direct UA-PL bilateral developments: border, military aid, refugee policy coordination"
    - "Direct security threats to Polish territory (not abstract NATO posture)"

  not_interested:
    - "General Polish domestic politics and demographics NOT specifically about foreigners"
    - "Migration/visa policy for non-Ukrainian citizens (Russians, Belarusians, others)"
    - "Macro news without direct personal cost-of-living or trading impact"
    - "Abstract EU diplomacy: UN seats, summit statements, ministerial photo ops"
    - "Global market panics without specific Polish actionability"
    - "Polish elections horse-race / poll movements (unless about migration policy)"
    - "Defense industry / NATO posture stories without immediate territorial implications"
    - "Sports, celebrity, weather, festivals, lifestyle"

  keyword_rules:
    keep_if_matches:
      - "(?i)\\b(Ukrain[a-zе]*|Україн[а-я]+|українц)"
      - "(?i)\\b(NBP|KNF|ECB|Federal Reserve|MiFID|ESMA)\\b"
      - "(?i)\\b(visa|residence|pobyt|karta pobytu)\\b"
      - "(?i)\\b(EUR|USD|PLN|UAH|FX|stop[ay] proc)"
    drop_if_matches:
      - "(?i)\\b(football|piłka nożna|soccer|baseball)\\b"
      - "(?i)\\b(celebrity|gossip|plotki)\\b"
      - "(?i)\\b(concert|koncert|festival|festyn)\\b"
      - "^(THE HACK|FIREPOWER|VOLTAGE|HARVEST|FIRST AID|RED THREAD|VOICES|THE BRIEF):"
